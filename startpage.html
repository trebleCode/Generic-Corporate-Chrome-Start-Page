<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Corporate Start Page</title>

<style>
    :root {
        --blue: #1a56db;
        --bg: #f6f8fb;
        --card: #ffffff;
        --border: #e3e7ef;
        --text: #1a1a1a;
        --muted: #6b7280;
    }

    body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
    }

    .topbar {
        padding: 24px 40px;
        font-size: 14px;
        letter-spacing: 1px;
        color: var(--muted);
        text-transform: uppercase;
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        padding: 0 40px 40px 40px;
        max-width: 1200px;
    }

    /* MODULE CARD */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        position: relative;
    }

    /* LEFT ACCENT BAR */
    .card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 14px;
        bottom: 14px;
        width: 3px;
        border-radius: 3px;
        background: var(--border);
    }

    /* MODULE VARIANTS */
    .card.apps::before {
        background: var(--blue);
    }

    .card.wikis::before {
        background: #64748b;
    }

    .card.systems::before {
        background: #94a3b8;
    }

    .card h2 {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin: 0 0 16px 6px;
        color: var(--muted);
    }

    /* LINKS (NO GLOW, NO NEON) */
    .link {
        display: block;
        padding: 10px 12px;
        margin-bottom: 10px;
        border-radius: 8px;
        text-decoration: none;
        color: var(--text);

        /* hidden border in rest state */
        border: 1px solid var(--bg);

        transition: all 0.15s ease;
    }

    .link:hover {
        border: 1px solid var(--border);
        background: rgba(26, 86, 219, 0.03);
    }

    .link:active {
        transform: scale(0.99);
    }

    .footer {
        padding: 20px 40px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
    }

    @media (max-width: 900px) {
        .container {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<div class="topbar">
    Corporate Command Center
</div>

<div class="container">

    <!-- APPS -->
    <div class="card apps">
        <h2>Apps</h2>
        <a class="link" href="https://news.ycombinator.com" target="_blank">
            Major App One
        </a>
        <a class="link" href="https://youtube.com" target="_blank">
            Major App 2
        </a>
    </div>

    <!-- WIKIS -->
    <div class="card wikis">
        <h2>Wikis</h2>
        <a class="link" href="https://www.atlassian.com" target="_blank">
            Team Wiki
        </a>
        <a class="link" href="https://www.example.com" target="_blank">
            Partner Wiki
        </a>
    </div>

    <!-- SYSTEMS -->
    <div class="card systems">
        <h2>Systems</h2>
        <a class="link" href="#">
            Server One
        </a>
        <a class="link" href="#">
            Server Two
        </a>
    </div>

</div>

<div class="footer">
    Minimal local dashboard • No APIs • No backend
</div>

</body>
</html>
